<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourtCheck — Tennis Court Directory</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="description" content="CourtCheck — Find tennis courts near you and check real-time conditions. Crowdsourced reports on puddles, wait times, court quality, and more.">
  <meta name="keywords" content="tennis courts, tennis court conditions, find tennis courts, court wait times, wet courts, tennis near me, public tennis courts">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://courtcheck-production.up.railway.app">
  <meta property="og:title" content="CourtCheck — Real-Time Tennis Court Conditions">
  <meta property="og:description" content="Crowdsourced tennis court conditions. Check for puddles, long waits, and closures before you head out.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://courtcheck-production.up.railway.app">
  <meta property="og:image" content="https://courtcheck-production.up.railway.app/courtcheck-logo.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CourtCheck — Real-Time Tennis Court Conditions">
  <meta name="twitter:description" content="Crowdsourced tennis court conditions. Check for puddles, long waits, and closures before you head out.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CourtCheck",
    "description": "Crowdsourced tennis court conditions directory",
    "url": "https://courtcheck-production.up.railway.app",
    "applicationCategory": "SportsApplication"
  }
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><a href="/"><img src="/courtcheck-logo.svg" alt="CourtCheck" class="header-logo"><span class="header-title">CourtCheck</span></a></h1>
      <nav>
        <a href="/add.html" class="nav-add">+ Add Court</a>
      </nav>
    </div>
  </header>

  <div class="hero-banner">
    Real-time tennis court conditions — crowdsourced by players like you
  </div>

  <main class="container">
    <h2 class="page-title">Tennis Court Directory</h2>

    <div class="filters">
      <input type="text" id="filter-search" placeholder="Search by court name..." autocomplete="off">
      <select id="filter-state">
        <option value="">All States</option>
      </select>
      <select id="filter-city">
        <option value="">All Cities</option>
      </select>
    </div>

    <div id="court-list" class="court-list">
      <div class="loading">Loading courts...</div>
    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
