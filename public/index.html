<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourtChek — Arlington, VA Tennis Court Conditions</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="description" content="CourtChek — Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <meta name="keywords" content="tennis courts, tennis court conditions, find tennis courts, court wait times, wet courts, tennis near me, public tennis courts, Arlington VA tennis">
  <meta name="robots" content="index, follow">
  <meta name="geo.region" content="US-VA">
  <meta name="geo.placename" content="Arlington, Virginia">
  <meta name="geo.position" content="38.8816;-77.0910">
  <meta name="ICBM" content="38.8816, -77.0910">
  <link rel="canonical" href="https://courtcheck-production.up.railway.app">
  <meta property="og:title" content="CourtChek — Arlington, VA Tennis Court Conditions">
  <meta property="og:description" content="Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://courtcheck-production.up.railway.app">
  <meta property="og:image" content="https://courtcheck-production.up.railway.app/courtcheck-logo.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CourtChek — Arlington, VA Tennis Court Conditions">
  <meta name="twitter:description" content="Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CourtChek",
    "description": "Crowdsourced tennis court conditions directory",
    "url": "https://courtcheck-production.up.railway.app",
    "applicationCategory": "SportsApplication"
  }
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>
        <a href="/">
          <img src="/courtcheck-logo.svg" alt="CourtChek" class="header-logo">
          <span class="header-title-group">
            <span class="header-title">CourtChek</span>
            <span class="header-subtitle">Arlington, VA</span>
          </span>
        </a>
      </h1>
      <nav>
        <a href="/add.html" class="nav-add">+ Add Court</a>
      </nav>
    </div>
  </header>

  <div class="hero-banner">
    Real-time tennis court conditions for Arlington, VA — crowdsourced by local players
  </div>

  <div id="weather-bar" class="weather-bar">
    <div class="weather-bar-inner">Loading weather...</div>
  </div>

  <main class="container">
    <h2 class="page-title">Tennis Court Directory</h2>

    <div class="filters">
      <input type="text" id="filter-search" placeholder="Search by court name..." autocomplete="off">
      <select id="filter-state">
        <option value="">All States</option>
      </select>
      <select id="filter-city">
        <option value="">All Cities</option>
      </select>
      <label class="filter-checkbox"><input type="checkbox" id="filter-lights"> Lighted courts only</label>
    </div>

    <button id="view-toggle" class="view-toggle">📋 List View</button>

    <div id="court-map" class="court-map"></div>

    <div id="court-list" class="court-list">
      <div class="loading">Loading courts...</div>
    </div>
  </main>

  <div id="hourly-forecast" class="hourly-forecast">
    <div class="hourly-forecast-inner">
      <div class="hourly-forecast-label">Loading 24-hour forecast...</div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/weather.js"></script>
</body>
</html>
