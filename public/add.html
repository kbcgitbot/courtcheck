<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a Court — CourtCheck</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="description" content="CourtCheck — Find tennis courts near you and check real-time conditions. Crowdsourced reports on puddles, wait times, court quality, and more.">
  <meta name="keywords" content="tennis courts, tennis court conditions, find tennis courts, court wait times, wet courts, tennis near me, public tennis courts">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://courtcheck-production.up.railway.app">
  <meta property="og:title" content="CourtCheck — Real-Time Tennis Court Conditions">
  <meta property="og:description" content="Crowdsourced tennis court conditions. Check for puddles, long waits, and closures before you head out.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://courtcheck-production.up.railway.app">
  <meta property="og:image" content="https://courtcheck-production.up.railway.app/courtcheck-logo.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CourtCheck — Real-Time Tennis Court Conditions">
  <meta name="twitter:description" content="Crowdsourced tennis court conditions. Check for puddles, long waits, and closures before you head out.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CourtCheck",
    "description": "Crowdsourced tennis court conditions directory",
    "url": "https://courtcheck-production.up.railway.app",
    "applicationCategory": "SportsApplication"
  }
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><a href="/"><img src="/courtcheck-logo.svg" alt="CourtCheck" class="header-logo"></a></h1>
      <nav>
        <a href="/">Directory</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 class="page-title">Add a Court</h2>

    <form id="add-court-form" class="add-court-form">
      <div class="form-group">
        <label for="name">Court Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Riverside Park Tennis Courts">
      </div>

      <div class="form-group">
        <label for="address">Address *</label>
        <input type="text" id="address" name="address" required placeholder="e.g. 123 Main St">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City *</label>
          <input type="text" id="city" name="city" required placeholder="e.g. Austin">
        </div>
        <div class="form-group">
          <label for="state">State *</label>
          <input type="text" id="state" name="state" required placeholder="e.g. TX" maxlength="2" style="text-transform:uppercase">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="num_courts">Number of Courts *</label>
          <input type="number" id="num_courts" name="num_courts" required min="1" placeholder="e.g. 6">
        </div>
        <div class="form-group">
          <label for="surface">Surface Type *</label>
          <select id="surface" name="surface" required>
            <option value="">Select...</option>
            <option value="hard">Hard</option>
            <option value="clay">Clay</option>
            <option value="grass">Grass</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="public_private">Access *</label>
        <select id="public_private" name="public_private" required>
          <option value="">Select...</option>
          <option value="public">Public</option>
          <option value="private">Private</option>
        </select>
      </div>

      <div class="form-group">
        <label for="maps_link">Google Maps Link (optional)</label>
        <input type="url" id="maps_link" name="maps_link" placeholder="https://maps.google.com/...">
      </div>

      <button type="submit" class="btn btn-primary">Add Court</button>
    </form>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/add.js"></script>
</body>
</html>
