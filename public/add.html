<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CourtChek — Arlington, VA Tennis Court Conditions</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="description" content="CourtChek — Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <meta name="keywords" content="tennis courts, tennis court conditions, find tennis courts, court wait times, wet courts, tennis near me, public tennis courts, Arlington VA tennis">
  <meta name="robots" content="index, follow">
  <meta name="geo.region" content="US-VA">
  <meta name="geo.placename" content="Arlington, Virginia">
  <meta name="geo.position" content="38.8816;-77.0910">
  <meta name="ICBM" content="38.8816, -77.0910">
  <link rel="canonical" href="https://courtcheck-production.up.railway.app">
  <meta property="og:title" content="CourtChek — Arlington, VA Tennis Court Conditions">
  <meta property="og:description" content="Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://courtcheck-production.up.railway.app">
  <meta property="og:image" content="https://courtcheck-production.up.railway.app/courtcheck-logo.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CourtChek — Arlington, VA Tennis Court Conditions">
  <meta name="twitter:description" content="Real-time tennis court conditions for Arlington, VA. Crowdsourced reports on puddles, wait times, and court quality from local players.">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CourtChek",
    "description": "Crowdsourced tennis court conditions directory",
    "url": "https://courtcheck-production.up.railway.app",
    "applicationCategory": "SportsApplication"
  }
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>
        <a href="/">
          <img src="/courtcheck-logo.svg" alt="CourtChek" class="header-logo">
          <span class="header-title-group">
            <span class="header-title">CourtChek</span>
            <span class="header-subtitle">Arlington, VA</span>
          </span>
        </a>
      </h1>
      <nav>
        <a href="/">Directory</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 class="page-title">Add a Court</h2>

    <form id="add-court-form" class="add-court-form">
      <div class="form-group">
        <label for="name">Court Name *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Riverside Park Tennis Courts">
      </div>

      <div class="form-group">
        <label for="address">Address *</label>
        <input type="text" id="address" name="address" required placeholder="e.g. 123 Main St">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City *</label>
          <input type="text" id="city" name="city" required placeholder="e.g. Austin">
        </div>
        <div class="form-group">
          <label for="state">State *</label>
          <select id="state" name="state" required>
            <option value="">Select...</option>
            <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option>
            <option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DC">DC</option>
            <option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option>
            <option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option>
            <option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option>
            <option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option>
            <option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option>
            <option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option>
            <option value="NY">NY</option><option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option>
            <option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option>
            <option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option>
            <option value="UT">UT</option><option value="VT">VT</option><option value="VA" selected>VA</option><option value="WA">WA</option>
            <option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="num_courts">Number of Courts *</label>
          <input type="number" id="num_courts" name="num_courts" required min="1" placeholder="e.g. 6">
        </div>
        <div class="form-group">
          <label for="surface">Surface Type *</label>
          <select id="surface" name="surface" required>
            <option value="">Select...</option>
            <option value="hard">Hard</option>
            <option value="clay">Clay</option>
            <option value="grass">Grass</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="public_private">Access *</label>
        <select id="public_private" name="public_private" required>
          <option value="">Select...</option>
          <option value="public">Public</option>
          <option value="private">Private</option>
        </select>
      </div>

      <div class="form-group">
        <label for="maps_link">Google Maps Link (optional)</label>
        <input type="url" id="maps_link" name="maps_link" placeholder="https://maps.google.com/...">
      </div>

      <div class="form-group">
        <label for="has_lights">Lights available?</label>
        <select id="has_lights" name="has_lights">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="latitude">Latitude (optional)</label>
          <input type="number" id="latitude" name="latitude" step="any" placeholder="e.g. 38.8816">
        </div>
        <div class="form-group">
          <label for="longitude">Longitude (optional)</label>
          <input type="number" id="longitude" name="longitude" step="any" placeholder="e.g. -77.0910">
        </div>
      </div>

      <div class="form-group" style="position:absolute;left:-9999px;top:-9999px;" aria-hidden="true">
        <label for="website">Leave this empty</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary">Add Court</button>
    </form>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/add.js"></script>
</body>
</html>
